spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:27017/thinkofyou
spring.jackson.serialization.write-dates-as-timestamps=false
logging.level.de.kaviedes=DEBUG
app.recovery.mail.enabled=${RECOVERY_MAIL_ENABLED:false}
app.recovery.mail.from=${RECOVERY_MAIL_FROM:noreply@think-of-you.local}
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
